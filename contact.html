<!DOCTYPE html>
<html lang="en">
<head>
    <title>Greentop</title>
    <style>
        body {
            background-color: rgb(202, 223, 202);
            font-family: Arial, sans-serif;
            font-size: 20px;
            margin: 0;
            padding: 20px;
        }

        h1, h3 {
            text-align: center;
        }

        .button-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            margin: 10px auto;
            cursor: pointer;
        }

        .button-container {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Contact Us</h1>

    <h3>Contact Us Through Instagram</h3>
    <div class="button-container">
        <a href="https://www.instagram.com/" target="_blank">
            <button class="button-link">Follow Us</button>
        </a>
    </div>

    <h3>Contact Us Through LinkedIn</h3>
    <div class="button-container">
        <a href="https://www.linkedin.com/feed/" target="_blank">
            <button class="button-link">Follow Us</button>
        </a>
    </div>

    <h3>Visit Us Here</h3>
    <div class="button-container">
        <a href="https://greentopindia.com/" target="_blank">
            <button class="button-link">Go to Website</button>
        </a>
    </div>
</body>
</html>
