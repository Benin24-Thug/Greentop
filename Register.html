      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      box-sizing: border-box;
    }

    label {
      font-weight: bold;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      width: 100%;

    .submit-btn {

<body>

  <div class="container">
    <h1>GreenTop<br><small>Information Technology</small></h1>
    <h2>Register Now</h2>
    <form action="save_response.php" method="post" enctype="multipart/form-data">
      <input type="text" name="firstname" placeholder="First Name" required>
      <input type="text" name="lastname" placeholder="Surname" required>
      <input type="email" name="email" placeholder="Email" required>

      <div class="row">
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="text" name="gender" placeholder="Gender">
      </div>

      <div class="row">
        <input type="number" name="age" placeholder="Age">
        <input type="date" name="dob" placeholder="Date of Birth">
      </div>

      <textarea name="address" placeholder="Address" rows="3"></textarea>

      <input type="text" name="position" placeholder="Internship Role">

      <select name="Projects done efore">
        <option value="">Projects done before</option>
        
      </select>

      <label>Attach your resume here</label>
      <input type="file" name="resume">

      <textarea name="reason" placeholder="Why do you want to join us?" rows="4"></textarea>

      <label>
        <input type="checkbox" name="confirm" required>
        I confirm that the information provided is accurate.
      </label>

      <input type="submit" value="Submit" class="submit-btn">
    </form>
  </div>
